# SonarCloud Configuration
# https://docs.sonarsource.com/sonarqube-server/latest/project-administration/analysis-parameters/
#
# LMDS V6.0 — Google Apps Script project
# We only want JavaScript analysis of .gs files (Apps Script = JavaScript)
# All .html/.css files are excluded (including src/3_group3_webapp/ which
# contains Google Apps Script HTML templates with inline <script> — but
# SonarCloud's HTML analyzer flags false positives on these GAS templates)

sonar.projectKey=Siriwat08_phaopanya-scg
sonar.organization=siriwat08

# ─────────────────────────────────────────────────────────────────────
# Exclusions — everything NOT production JavaScript code
# ─────────────────────────────────────────────────────────────────────
# Folders:
#   - node_modules     = dependencies
#   - Information from AI = legacy AI reports (deleted in V6.0.049 but kept for safety)
#   - exports/         = pre-formatted skill exports (documentation)
#   - .skills/         = skill definitions (documentation)
#   - docs/            = documentation (includes AI review .html reports)
#   - scripts/         = dev tooling (bump_version.sh, setup scripts)
#
# File types (ALL .html and .css files excluded — they are GAS templates,
# not standard HTML/CSS):
#   - **/*.html        = GAS HTML templates + AI review dashboards
#   - **/*.css         = GAS CSS templates (if any)
#   - **/*.zip         = skill suite archives
#   - **/*.skill       = skill files
sonar.exclusions=**/node_modules/**,**/Information from AI allows you to check it quickly/**,**/exports/**,**/.skills/**,**/docs/**,**/scripts/**,**/*.html,**/*.css,**/*.zip,**/*.skill

# Only analyze source code (src/ contains .gs files + .html templates)
sonar.sources=src

# Language: JavaScript only (Apps Script .gs files are JavaScript)
sonar.language=js

# Encoding
sonar.sourceEncoding=UTF-8

# ─────────────────────────────────────────────────────────────────────
# Coverage exclusions (same as above — don't track coverage for non-JS)
# ─────────────────────────────────────────────────────────────────────
sonar.coverage.exclusions=**/*.html,**/*.css,**/*.zip,**/*.skill,**/docs/**,**/scripts/**,**/.skills/**,**/exports/**

# ─────────────────────────────────────────────────────────────────────
# Duplication exclusions (GAS templates have repetitive HTML structure)
# ─────────────────────────────────────────────────────────────────────
sonar.cpd.exclusions=**/*.html,**/*.css
