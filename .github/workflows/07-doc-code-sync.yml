# 🔗 Doc-Code Sync Check
#
# ตรวจสอบว่าโค้ด ↔ เอกสารยังตรงกัน 100% หลัง merge PR
# กัน regression ของ version drift, stat mismatch, dead paths, phantom deps
#
# Triggers:
#   - pull_request: เมื่อมี PR แตะ src/ หรือ docs/
#   - push to main: เมื่อ merge PR เข้า main
#   - workflow_dispatch: รัน manual ได้
#
# ถ้า check ใด fail → PR จะถูก block (except 'warning' checks)

name: 🔗 Doc-Code Sync Check

on:
  pull_request:
    paths:
      - 'src/**'
      - 'docs/**'
      - '*.md'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/07-doc-code-sync.yml'
      - '.github/scripts/doc-code-sync-checks/**'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/**'
      - '*.md'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  sync-check:
    name: Sync Verification
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 🛠️ Setup permissions
        run: chmod +x .github/scripts/doc-code-sync-checks/*.sh

      - name: 📋 Check 1 — Version Consistency
        id: check1
        continue-on-error: false
        run: .github/scripts/doc-code-sync-checks/check_01_version.sh

      - name: 📋 Check 2 — Stats Consistency
        id: check2
        continue-on-error: true
        run: .github/scripts/doc-code-sync-checks/check_02_stats.sh

      - name: 📋 Check 3 — No file:/// Paths
        id: check3
        continue-on-error: false
        run: .github/scripts/doc-code-sync-checks/check_03_local_paths.sh

      - name: 📋 Check 4 — No Phantom Deps
        id: check4
        continue-on-error: false
        run: .github/scripts/doc-code-sync-checks/check_04_phantom_deps.sh

      - name: 📋 Check 5 — Internal Links Resolve
        id: check5
        continue-on-error: true
        run: .github/scripts/doc-code-sync-checks/check_05_internal_links.sh

      - name: 📋 Check 6 — Verify Claimed Fixes
        id: check6
        continue-on-error: false
        run: .github/scripts/doc-code-sync-checks/check_06_verify_fixes.sh

      - name: 📋 Check 7 — Header CHANGELOG Sync
        id: check7
        continue-on-error: true
        env:
          STRICT_MODE: '0'
        run: .github/scripts/doc-code-sync-checks/check_07_header_changelog.sh

      - name: 📋 Check 8 — Header DEPENDENCIES Sync
        id: check8
        continue-on-error: true
        env:
          STRICT_MODE: '0'
        run: .github/scripts/doc-code-sync-checks/check_08_header_dependencies.sh

      - name: 📋 Check 9 — DOC-TYPE Coverage
        id: check9
        continue-on-error: true
        run: .github/scripts/doc-code-sync-checks/check_09_doc_type_coverage.sh

      # [V6.0.068] Wire check_10-18 into CI (Reviewer #1 TD-012 Round 3)
      - name: 📋 Check 10 — Dead Functions
        id: check10
        continue-on-error: true
        env:
          STRICT_MODE: '0'
        run: .github/scripts/doc-code-sync-checks/check_10_dead_functions.sh

      - name: 📋 Check 11 — Wrapper Usage
        id: check11
        continue-on-error: true
        run: .github/scripts/doc-code-sync-checks/check_11_wrapper_usage.sh

      - name: 📋 Check 12 — Path Consistency
        id: check12
        continue-on-error: true
        run: .github/scripts/doc-code-sync-checks/check_12_path_consistency.sh

      - name: 📋 Check 13 — No Runtime CDN
        id: check13
        continue-on-error: true
        env:
          STRICT_MODE: '0'
        run: .github/scripts/doc-code-sync-checks/check_13_no_runtime_cdn.sh

      - name: 📋 Check 14 — External API Resilience
        id: check14
        continue-on-error: true
        env:
          STRICT_MODE: '0'
        run: .github/scripts/doc-code-sync-checks/check_14_external_api_resilience.sh

      - name: 📋 Check 15 — String Duplication
        id: check15
        continue-on-error: true
        env:
          STRICT_MODE: '0'
        run: .github/scripts/doc-code-sync-checks/check_15_string_duplication.sh

      - name: 📋 Check 16 — API Call Count
        id: check16
        continue-on-error: true
        env:
          STRICT_MODE: '0'
        run: .github/scripts/doc-code-sync-checks/check_16_api_call_count.sh

      - name: 📋 Check 17 — Production Readiness
        id: check17
        continue-on-error: true
        env:
          STRICT_MODE: '0'
        run: .github/scripts/doc-code-sync-checks/check_17_production_readiness.sh

      - name: 📋 Check 18 — PR Title vs Diff
        id: check18
        continue-on-error: true
        run: .github/scripts/doc-code-sync-checks/check_18_pr_title_vs_diff.sh

      - name: 📊 Summary Report
        if: always()
        run: |
          echo "## 🔗 Doc-Code Sync Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1. Version Consistency | ${{ steps.check1.outcome == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 2. Stats Consistency | ${{ steps.check2.outcome == 'success' && '✅ PASS' || '⚠️ WARN' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3. No file:/// Paths | ${{ steps.check3.outcome == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 4. No Phantom Deps | ${{ steps.check4.outcome == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 5. Internal Links Resolve | ${{ steps.check5.outcome == 'success' && '✅ PASS' || '⚠️ WARN' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 6. Verify Claimed Fixes | ${{ steps.check6.outcome == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 7. Header CHANGELOG Sync | ${{ steps.check7.outcome == 'success' && '✅ PASS' || '⚠️ WARN' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 8. Header DEPENDENCIES Sync | ${{ steps.check8.outcome == 'success' && '✅ PASS' || '⚠️ WARN' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 9. DOC-TYPE Coverage | ${{ steps.check9.outcome == 'success' && '✅ PASS' || '⚠️ WARN' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 10. Dead Functions | ${{ steps.check10.outcome == 'success' && '✅ PASS' || '⚠️ WARN' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 11. Wrapper Usage | ${{ steps.check11.outcome == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 12. Path Consistency | ${{ steps.check12.outcome == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 13. No Runtime CDN | ${{ steps.check13.outcome == 'success' && '✅ PASS' || '⚠️ WARN' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 14. External API Resilience | ${{ steps.check14.outcome == 'success' && '✅ PASS' || '⚠️ WARN' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 15. String Duplication | ${{ steps.check15.outcome == 'success' && '✅ PASS' || '⚠️ WARN' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 16. API Call Count | ${{ steps.check16.outcome == 'success' && '✅ PASS' || '⚠️ WARN' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 17. Production Readiness | ${{ steps.check17.outcome == 'success' && '✅ PASS' || '⚠️ WARN' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 18. PR Title vs Diff | ${{ steps.check18.outcome == 'success' && '✅ PASS' || '⚠️ WARN' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Critical checks (1, 3, 4, 6, 11, 12) must pass. Warnings (2, 5, 7-10, 13-18) are advisory.**" >> $GITHUB_STEP_SUMMARY
